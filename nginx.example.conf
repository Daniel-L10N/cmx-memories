# cmx-memories Nginx Configuration Examples
# Copy to your nginx sites-available and enable

# ============================================
# Option 1: Root domain (simpler)
# ============================================
server {
    listen 80;
    server_name cmx-memories.yourdomain.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # API Key authentication
        proxy_set_header X-API-Key "CHANGE_ME_TO_SECURE_KEY";
    }
}

# ============================================
# Option 2: Subpath /cmx-memories
# ============================================
server {
    listen 80;
    server_name yourdomain.com;

    # cmx-memories API under subpath
    location /cmx-memories/ {
        # Note: when CMX_BASE_PATH=/cmx-memories is set on server,
        # proxy to the base path as well
        proxy_pass http://127.0.0.1:3000/cmx-memories/;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # API Key authentication
        proxy_set_header X-API-Key "CHANGE_ME_TO_SECURE_KEY";
    }
}

# ============================================
# Option 3: SSL/HTTPS (Recommended for production)
# ============================================
server {
    listen 443 ssl http2;
    server_name cmx-memories.yourdomain.com;

    # SSL certificates (generated by Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # API Key authentication
        proxy_set_header X-API-Key "CHANGE_ME_TO_SECURE_KEY";
    }
}

